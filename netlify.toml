[build]
  base = "hearst-design-system"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Old Netlify Storybook URLs → main app (component docs: run `npm run storybook` locally).
[[redirects]]
  from = "/storybook"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/storybook/*"
  to = "/"
  status = 301
  force = true

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Storybook story index + HTML shells are not fingerprinted. Do NOT inherit
# immutable caching from `/_next/static/*` or browsers keep a stale sidebar
# (e.g. missing Foundation/Grid System) until a hard reset — Cursor’s browser
# often looks “correct” because its cache partition is empty or fresher.
[[headers]]
  for = "/_next/static/sb/index.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/_next/static/sb/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/_next/static/sb/iframe.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
