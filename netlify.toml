[build]
  base = "hearst-design-system"
  command = "npm run build-storybook"
  publish = "storybook-static"

[build.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[[redirects]]
  from = "/storybook"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/_next/static/sb/*"
  to = "/:splat"
  status = 301
  force = true

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
