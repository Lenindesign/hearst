[build]
  base = "hearst-design-system"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Storybook is not part of the Netlify output anymore (`npm run storybook` locally).
# Bookmarked /storybook and `/_next/static/sb/*` URLs would otherwise 404 — send users to the main app.
[[redirects]]
  from = "/storybook"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/storybook/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/_next/static/sb"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/_next/static/sb/*"
  to = "/"
  status = 301
  force = true

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
