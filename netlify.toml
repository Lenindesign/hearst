[build]
  base = "hearst-design-system"
  command = "npm run build && npx storybook build -o .next/static/sb --quiet && node scripts/fix-storybook-paths.mjs"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Serve Storybook at /storybook without exposing /_next/static/sb/ in the address bar (200 rewrite).
[[redirects]]
  from = "/storybook"
  to = "/_next/static/sb/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/storybook/*"
  to = "/_next/static/sb/index.html"
  status = 200
  force = true

# Canonical URL for bookmarks that still use the static output path directly.
[[redirects]]
  from = "/_next/static/sb/index.html"
  to = "/storybook"
  status = 301
  force = true

[[redirects]]
  from = "/_next/static/sb"
  to = "/storybook"
  status = 301
  force = true

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Storybook index + HTML shells are not fingerprinted; avoid immutable caching on them.
[[headers]]
  for = "/_next/static/sb/index.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/_next/static/sb/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/_next/static/sb/iframe.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
